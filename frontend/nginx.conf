server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  location /api/ { proxy_pass http://backend:3000/; proxy_set_header Host $host; proxy_read_timeout 120s; }
  location /static/ { proxy_pass http://backend:3000/static/; }
  location / { try_files $uri /index.html; }
}
