# Snippet to add to /etc/nginx/sites-available/sunmaggie-12883.conf
# (the public yardex vhost). Include this with `include /home/chong/.../yardex-12883-public-snippet.conf;`
# inside the server { ... } block, BEFORE the /api/ location.
#
# Why: customer-shareable PDFs (rendered by PdfService) live under
# <DATA_DIR>/public/pdfs/ and are served by the backend's
# PublicAssetsController on /public/pdfs/:filename (no auth).
# We forward that path straight to the backend so the unauthenticated
# route actually reaches NestJS. The backend controller enforces its
# own filename/path checks.

location /public/ {
    proxy_pass http://127.0.0.1:12888/public/;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    client_max_body_size 20M;
    add_header Cache-Control "public, max-age=300, must-revalidate";
}
